name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest  # imsg requires macOS
    steps:
      - uses: actions/checkout@v4

      - name: Install imsg
        run: brew install steipete/tap/imsg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v
        # The TestAuthzPatch and TestInstallDryRun suites need the
        # user's live hermes-agent checkout, which doesn't exist on
        # CI. Skip them. The rest of the suite exercises the adapter
        # code itself.
        env:
          SKIP_LIVE_TESTS: "1"
